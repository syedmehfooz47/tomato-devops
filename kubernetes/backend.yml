apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: tomato
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: syedmehfooz/tomato-backend:v1.48
          ports:
            - containerPort: 4000
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb:27017/tomato"
            - name: JWT_SECRET
              value: "iUEE2gKvMsi26L9qMjPzwZOWfYT0hdZHgEReFL4jSqX"
            - name: SALT
              value: "10"
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: tomato
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      nodePort: 31002
