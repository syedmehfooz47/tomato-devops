apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-deployment
  namespace: tomato
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      name: admin
      labels:
        app: admin
    spec:
      containers:
        - name: admin
          image: syedmehfooz/tomato-admin:v1.2
          ports:
            - containerPort: 5174
          # Note: VITE_BACKEND_URL is baked into the image at build time via .env.docker
          # Runtime env vars have no effect on Vite static bundles
          # The Automations/update-admin-env.sh script sets the correct URL before docker build
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: tomato
spec:
  type: NodePort
  selector:
    app: admin
  ports:
    - port: 5174
      targetPort: 5174
      protocol: TCP
      nodePort: 31001